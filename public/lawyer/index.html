<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פאנל עורך דין | Batumionline</title>
  <meta name="theme-color" content="#c9a84c" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/assets/icons/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    body, body * { font-family: 'Assistant', sans-serif; }
    body { background: var(--navy); min-height: 100vh; }
    .lawyer-wrap { max-width: 700px; margin: 0 auto; padding: 1.5rem; }
    .lawyer-header { text-align: center; padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
    .lawyer-header h1 { font-family: 'Assistant', sans-serif; font-size: 1.4rem; color: var(--gold-light); margin-top: 0.75rem; }
    .client-card {
      background: var(--navy-mid); border: 1px solid var(--border); border-radius: 14px;
      padding: 1.25rem; margin-bottom: 1rem; transition: border-color 0.2s;
    }
    .client-card:hover { border-color: rgba(201,168,76,0.3); }
    .client-name { font-size: 1.05rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.15rem; }
    .client-name-en { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .client-meta { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.75rem; font-size: 0.82rem; color: var(--text-muted); }
    .client-actions { display: flex; flex-direction: row; gap: 0.5rem; }
    .step-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; min-width: 0;
      padding: 0.6rem 0.4rem; border-radius: 10px; border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.04); color: var(--text-main);
      font-family: 'Assistant', sans-serif; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-align: center; gap: 0.2rem;
    }
    .step-btn:hover:not(:disabled) { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.06); }
    .step-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .step-btn.done { border-color: rgba(46,204,113,0.4); background: rgba(46,204,113,0.08); color: #2ecc71; }
    .step-btn .step-icon { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; margin-bottom: 0.15rem; }
    .step-btn.done .step-icon { background: #2ecc71; border-color: #2ecc71; color: #fff; }
    .step-btn .btn-he { font-size: 0.8rem; font-weight: 700; line-height: 1.2; }
    .step-btn .btn-en { font-size: 0.65rem; font-weight: 400; color: var(--text-muted); line-height: 1.2; }
    .step-btn.done .btn-en { color: rgba(46,204,113,0.6); }
    .step-btn label { cursor: pointer; margin: 0; display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .step-btn label input[type="file"] { display: none; }
    .completed-msg { text-align: center; padding: 0.75rem; color: #2ecc71; font-weight: 700; font-size: 0.95rem; }
    @media (max-width: 500px) {
      .client-actions { flex-wrap: wrap; }
      .step-btn { flex: 1 1 45%; }
    }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
    .empty-state div { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div style="max-width:360px;width:100%;padding:1.5rem;">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div class="logo-icon" style="margin:0 auto 0.75rem;width:48px;height:48px;background:#c9a84c;color:#0d1b2e;font-family:Arial,sans-serif;font-weight:800;font-size:1.5rem;display:flex;align-items:center;justify-content:center;border-radius:12px;">B</div>
      <h2 style="color:var(--gold-light);font-size:1.2rem;">פאנל עורך דין</h2>
      <p style="color:var(--text-muted);font-size:0.85rem;">Batumionline</p>
    </div>
    <div class="card">
      <div class="form-group">
        <input type="password" id="login-pass" class="form-control" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <div id="login-error" class="alert alert-error" style="display:none;"></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">כניסה</button>
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="lawyer-panel" style="display:none;">
  <div class="lawyer-wrap">
    <div class="lawyer-header">
      <div class="logo-icon" style="margin:0 auto;width:44px;height:44px;background:#c9a84c;color:#0d1b2e;font-family:Arial,sans-serif;font-weight:800;font-size:1.3rem;display:flex;align-items:center;justify-content:center;border-radius:11px;">B</div>
      <h1>⚖️ פאנל עורך דין</h1>
      <p style="color:var(--text-muted);font-size:0.85rem;">לקוחות בשלב שליחה ופתיחת חשבון</p>
    </div>

    <div id="clients-list"></div>

    <div style="text-align:center;margin-top:2rem;">
      <button class="btn btn-ghost" style="font-size:0.8rem;" onclick="loadClients()">🔄 רענן</button>
      <button class="btn btn-ghost" style="font-size:0.8rem;margin-right:0.5rem;" onclick="logout()">🚪 יציאה</button>
    </div>
  </div>
</div>

<script>
var lawyerToken = '';
var STEP_LABELS = {
  9: 'ממתין למשלוח', 10: 'מסמכים בדרך', 11: 'מסמכים הגיעו',
  12: 'חשבון נפתח', 13: 'הושלם'
};
var STEP_COLORS = {
  9: 'badge-purple', 10: 'badge-purple', 11: 'badge-green',
  12: 'badge-green', 13: 'badge-green'
};

// Init
(function() {
  var saved = sessionStorage.getItem('lawyer_token');
  if (saved) { lawyerToken = saved; showPanel(); }
})();

async function doLogin() {
  var pass = document.getElementById('login-pass').value;
  if (!pass) return;
  try {
    var res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });
    var data = await res.json();
    if (data.success) {
      lawyerToken = data.token;
      sessionStorage.setItem('lawyer_token', lawyerToken);
      showPanel();
    } else {
      // Try lawyer login
      var res2 = await fetch('/api/lawyer/clients', { headers: { 'x-lawyer-token': pass } });
      if (res2.ok) {
        lawyerToken = pass;
        sessionStorage.setItem('lawyer_token', lawyerToken);
        showPanel();
      } else {
        document.getElementById('login-error').textContent = 'סיסמה שגויה';
        document.getElementById('login-error').style.display = 'flex';
      }
    }
  } catch (e) {
    document.getElementById('login-error').textContent = 'שגיאת חיבור';
    document.getElementById('login-error').style.display = 'flex';
  }
}

function showPanel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('lawyer-panel').style.display = 'block';
  loadClients();
}

function logout() {
  sessionStorage.clear();
  window.location.reload();
}

function authHeaders() {
  return { 'Content-Type': 'application/json', 'x-lawyer-token': lawyerToken };
}

async function loadClients() {
  try {
    var res = await fetch('/api/lawyer/clients', { headers: { 'x-lawyer-token': lawyerToken } });
    var data = await res.json();
    renderClients(data.clients || []);
  } catch (e) {
    document.getElementById('clients-list').innerHTML = '<div class="alert alert-error">שגיאת חיבור</div>';
  }
}

function renderClients(clients) {
  var container = document.getElementById('clients-list');

  if (clients.length === 0) {
    container.innerHTML = '<div class="empty-state"><div>✅</div><p>אין לקוחות בשלב זה כרגע</p></div>';
    return;
  }

  container.innerHTML = clients.map(function(c) {
    var heName = (c.first_name || '') + ' ' + (c.last_name || '');
    var enName = ((c.passport_name_en || '') + ' ' + (c.passport_surname_en || '')).trim();

    // Determine state from actual data
    var s1 = c.passport_status === 'approved';
    var s2 = c.has_poa;
    var sDl = c.docs_downloaded ? true : false;
    var s3 = c.docs_received ? true : false;
    var s4 = c.account_opened ? true : false;
    var allDone = s1 && s2 && s3 && s4;

    // Who performed each action
    var s1by = s1 ? (c.passport_approved_by || '') : '';
    var s2by = s2 ? (c.poa_uploaded_by || '') : '';
    var sDlby = sDl ? (c.docs_downloaded_by || '') : '';
    var s3by = s3 ? (c.docs_received_by || '') : '';
    var s4by = s4 ? (c.account_opened_by || '') : '';

    function byLabel(by) { return by ? ' <span style="font-size:0.55rem;color:' + (by === 'admin' ? '#F4A94E' : '#3DA5C4') + ';">(' + by + ')</span>' : ''; }

    return '<div class="client-card">'
      + '<div class="client-name">' + heName + '</div>'
      + (enName ? '<div class="client-name-en">' + enName + '</div>' : '')
      + '<div class="client-meta">'
      +   '<span style="direction:ltr;">' + c.phone + '</span>'
      +   '<span style="font-size:0.75rem;">שלב ' + c.current_step + '</span>'
      +   (c.tracking_number ? '<span>📦 ' + (c.shipping_company || '') + ' ' + c.tracking_number + '</span>' : '')
      + '</div>'
      + '<div class="client-actions">'
      // Button 1: Passport approved
      +   '<button class="step-btn' + (s1 ? ' done' : '') + '" onclick="doStep1(' + c.id + ')">'
      +     '<span class="step-icon">' + (s1 ? '✓' : '1') + '</span>'
      +     '<span class="btn-he">🔍 צפה בדרכון' + byLabel(s1by) + '</span>'
      +     '<span class="btn-en">View Passport</span>'
      +   '</button>'
      // Button 2: POA uploaded
      +   '<label class="step-btn' + (s2 ? ' done' : '') + '">'
      +     '<span class="step-icon">' + (s2 ? '✓' : '2') + '</span>'
      +     '<span class="btn-he">📄 העלה ייפוי כח' + byLabel(s2by) + '</span>'
      +     '<span class="btn-en">Upload POA</span>'
      +     (s2 ? '' : '<input type="file" accept=".pdf" onchange="doStep2(' + c.id + ', this)" />')
      +   '</label>'
      // Download all docs
      +   '<button class="step-btn' + (sDl ? ' done' : '') + '" onclick="downloadDocs(' + c.id + ')">'
      +     '<span class="step-icon">' + (sDl ? '✓' : '📥') + '</span>'
      +     '<span class="btn-he">📥 הורד מסמכים' + byLabel(sDlby) + '</span>'
      +     '<span class="btn-en">Download Docs</span>'
      +   '</button>'
      // Button 3: Docs received
      +   '<button class="step-btn' + (s3 ? ' done' : '') + '"' + (s3 ? ' disabled' : '') + ' onclick="doStep3(' + c.id + ')">'
      +     '<span class="step-icon">' + (s3 ? '✓' : '3') + '</span>'
      +     '<span class="btn-he">✅ מסמכים הגיעו' + byLabel(s3by) + '</span>'
      +     '<span class="btn-en">Docs Received</span>'
      +   '</button>'
      // Button 4: Account opened
      +   '<button class="step-btn' + (s4 ? ' done' : '') + '"' + (!s3 || s4 ? ' disabled' : '') + ' onclick="doStep4(' + c.id + ')">'
      +     '<span class="step-icon">' + (s4 ? '✓' : '4') + '</span>'
      +     '<span class="btn-he">🏦 חשבון נפתח' + byLabel(s4by) + '</span>'
      +     '<span class="btn-en">Account Opened</span>'
      +   '</button>'
      + '</div>'
      + (allDone ? '<div class="completed-msg">✅ התהליך הושלם</div>' : '')
      + '</div>';
  }).join('');
}

// Step 1: View passport
async function doStep1(clientId) {
  try {
    var res = await fetch('/api/lawyer/client/' + clientId + '/docs', { headers: { 'x-lawyer-token': lawyerToken } });
    var data = await res.json();
    var passport = (data.docs || []).find(function(d) { return d.doc_type === 'passport' || d.doc_type === 'passport_drive'; });
    if (passport && passport.drive_url) {
      window.open(passport.drive_url, '_blank');
      // Mark step 1 as done
      await fetch('/api/lawyer/mark-step', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ client_id: clientId, step: 1 }) });
      loadClients();
    } else {
      alert('קובץ דרכון לא נמצא');
    }
  } catch (e) { alert('שגיאה'); }
}

// Step 2: Upload POA
async function doStep2(clientId, input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  if (file.type !== 'application/pdf') { alert('רק קבצי PDF'); return; }

  var formData = new FormData();
  formData.append('poa_file', file);

  try {
    var res = await fetch('/api/lawyer/upload-poa/' + clientId, {
      method: 'POST',
      headers: { 'x-lawyer-token': lawyerToken },
      body: formData
    });
    var data = await res.json();
    if (data.success) {
      await fetch('/api/lawyer/mark-step', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ client_id: clientId, step: 2 }) });
      alert('ייפוי כח הועלה בהצלחה!');
      loadClients();
    } else {
      alert(data.error || 'שגיאה');
    }
  } catch (e) { alert('שגיאת תקשורת'); }
  input.value = '';
}

// Download all docs as ZIP
function downloadDocs(clientId) {
  window.open('/api/lawyer/client/' + clientId + '/download-docs?token=' + lawyerToken, '_blank');
  // Refresh after short delay to show green state
  setTimeout(function() { loadClients(); }, 2000);
}

// Step 3: Docs received
async function doStep3(clientId) {
  if (!confirm('לסמן שהמסמכים הגיעו? הלקוח יקבל הודעה.')) return;
  try {
    var res = await fetch('/api/lawyer/docs-received', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ client_id: clientId })
    });
    var data = await res.json();
    alert(data.message || 'עודכן');
    loadClients();
  } catch (e) { alert('שגיאה'); }
}

// Step 4: Account opened
async function doStep4(clientId) {
  if (!confirm('לסמן שהחשבון נפתח? הלקוח יקבל הודעה מיד!')) return;
  try {
    var res = await fetch('/api/lawyer/account-opened', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ client_id: clientId })
    });
    var data = await res.json();
    alert(data.message || '🎉 עודכן!');
    loadClients();
  } catch (e) { alert('שגיאה'); }
}
</script>

</body>
</html>
